name: Build and Deploy LaTeX PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: LaTeX kompilieren
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex   # anpassen

      - name: Output vorbereiten (inkl. index.html)
        run: |
          mkdir public
          cp main.pdf public/index.pdf

          cat <<'EOF' > public/index.html
          <!DOCTYPE html>
          <html lang="de">
          <head>
            <meta charset="UTF-8">
            <title>PDF</title>
            <style>
              html, body {
                margin: 0;
                height: 100%;
              }
              iframe {
                width: 100%;
                height: 100%;
                border: none;
              }
            </style>
          </head>
          <body>
            <iframe src="index.pdf"></iframe>
          </body>
          </html>
          EOF

      - name: Pages Artifact hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: GitHub Pages deployen
        uses: actions/deploy-pages@v4