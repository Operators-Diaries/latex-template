name: Deploy LaTeX PDF Preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: LaTeX kompilieren
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Output vorbereiten
        run: |
          mkdir public
          cp main.pdf public/index.pdf
          cp .github/workflows/preview.html public/index.html

      - name: Pages Artifact hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: GitHub Pages deployen
        uses: actions/deploy-pages@v4